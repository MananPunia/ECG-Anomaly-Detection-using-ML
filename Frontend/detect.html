        function loadExample(classLabel) {
            document.getElementById("ecgInput").value = examples[classLabel];
            document.getElementById("resultBox").style.display = "none";
        }

        function predict() {
            const input = document.getElementById("ecgInput").value;
            if(!input.trim()) {
                alert("Please enter ECG values.");
                return;
            }

            const ecg = input.split(",").map(val => Number(val.trim()));
            
            const btn = document.getElementById("predictBtn");
            btn.textContent = "Analyzing...";
            btn.disabled = true;

            fetch("http://127.0.0.1:5000/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ ecg: ecg })
            })
            .then(response => response.json())
            .then(data => {
                btn.textContent = "Run Prediction";
                btn.disabled = false;
                
                const box = document.getElementById("resultBox");
                box.style.display = "block";

                if(data.error) {
                    document.getElementById("predClass").textContent = "Error";
                    document.getElementById("predClass").className = "result-title result-danger";
                    document.getElementById("predConf").parentElement.innerHTML = data.error;
                } else {
                    document.getElementById("predClass").textContent = data.result;
                    document.getElementById("predClass").className = "result-title result-" + data.urgency;
                    document.getElementById("predConf").parentElement.innerHTML = "<strong>Confidence:</strong> " + data.confidence + "%";
                }
            })
            .catch(error => {
                btn.textContent = "Run Prediction";
                btn.disabled = false;
                alert("Failed to connect to the backend API.");
            });
        }
